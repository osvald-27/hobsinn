spring:
  application:
    name: analytics-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DB:hobsinn_analytics}
      username: hobsinn_mongo
      password: ${MONGO_PASSWORD:changeme}

server:
  port: 8088

gar:
  jwt:
    secret: ${JWT_SECRET:changeme_minimum_64_chars_for_hs512_algorithm_padding}
    access-token-expiry-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.hobsinnovations.hobsinn: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
