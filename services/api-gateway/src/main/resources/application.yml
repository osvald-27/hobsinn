spring:
  application:
    name: api-gateway
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

server:
  port: 8080

gar:
  jwt:
    secret: ${JWT_SECRET:changeme_minimum_64_chars_for_hs512_algorithm_padding}
    access-token-expiry-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.hobsinnovations.hobsinn: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
