spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
      - id: user-service
        uri: http://user-service:8086
        predicates:
        - Path=/api/users/**
        filters:
        - StripPrefix=1
      - id: scheduling-service
        uri: http://scheduling-service:8081
        predicates:
        - Path=/api/scheduling/**
        filters:
        - StripPrefix=1
      - id: campaign-service
        uri: http://campaign-service:8082
        predicates:
        - Path=/api/campaigns/**
        filters:
        - StripPrefix=1
      - id: reporting-service
        uri: http://reporting-service:8083
        predicates:
        - Path=/api/reports/**
        filters:
        - StripPrefix=1
      - id: payment-service
        uri: http://payment-service:8084
        predicates:
        - Path=/api/payments/**
        filters:
        - StripPrefix=1
      - id: notification-service
        uri: http://notification-service:8085
        predicates:
        - Path=/api/notifications/**
        filters:
        - StripPrefix=1
      - id: provider-service
        uri: http://provider-service:8087
        predicates:
        - Path=/api/providers/**
        filters:
        - StripPrefix=1
      - id: analytics-service
        uri: http://analytics-service:8088
        predicates:
        - Path=/api/analytics/**
        filters:
        - StripPrefix=1
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

server:
  port: 8080

gar:
  jwt:
    secret: ${JWT_SECRET:changeme_minimum_64_chars_for_hs512_algorithm_padding}
    access-token-expiry-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.hobsinnovations.hobsinn: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
