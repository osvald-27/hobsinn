version: "3.9"

# hobsinn application services with infrastructure
# Self-contained demo environment
# Run: docker-compose up -d from this directory

networks:
  hobsinn-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  redis-data:
  mongodb-data:
  prometheus-data:
  grafana-data:

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: docker
  DB_HOST: hobsinn-postgres
  DB_PORT: 5432
  DB_NAME: hobsinn_db
  DB_USERNAME: hobsinn_user
  DB_PASSWORD: ${DB_PASSWORD:-changeme}
  KAFKA_BOOTSTRAP_SERVERS: hobsinn-kafka:9092
  REDIS_HOST: hobsinn-redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
  MONGO_HOST: hobsinn-mongodb
  MONGO_PORT: 27017
  MONGO_DB: hobsinn_analytics
  MONGO_PASSWORD: ${MONGO_PASSWORD:-changeme}
  JWT_SECRET: ${JWT_SECRET:-changeme_minimum_64_chars_for_hs512_algorithm_padding}

services:

  # Infrastructure Services
  hobsinn-postgres:
    image: postgis/postgis:15-3.3
    container_name: hobsinn-postgres
    networks: [hobsinn-network]
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: hobsinn_db
      POSTGRES_USER: hobsinn_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hobsinn_user -d hobsinn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  hobsinn-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: hobsinn-kafka
    networks: [hobsinn-network]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: hobsinn-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://hobsinn-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      hobsinn-zookeeper:
        condition: service_healthy
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  hobsinn-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: hobsinn-zookeeper
    networks: [hobsinn-network]
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  hobsinn-redis:
    image: redis:7-alpine
    container_name: hobsinn-redis
    networks: [hobsinn-network]
    ports: ["6379:6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --raw incr ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hobsinn-mongodb:
    image: mongo:7-jammy
    container_name: hobsinn-mongodb
    networks: [hobsinn-network]
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: hobsinn_analytics
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Services

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    container_name: hobsinn-api-gateway
    networks: [hobsinn-network]
    ports: ["8080:8080"]
    environment:
      <<: *common-env
    depends_on:
      hobsinn-postgres:
        condition: service_healthy
      hobsinn-kafka:
        condition: service_healthy
      hobsinn-redis:
        condition: service_healthy
      hobsinn-mongodb:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: ../../
      dockerfile: services/user-service/Dockerfile
    container_name: hobsinn-user-service
    networks: [hobsinn-network]
    ports: ["8086:8086"]
    environment:
      <<: *common-env
    depends_on:
      hobsinn-postgres:
        condition: service_healthy
    restart: unless-stopped

  scheduling-service:
    build:
      context: ../../
      dockerfile: services/scheduling-service/Dockerfile
    container_name: hobsinn-scheduling-service
    networks: [hobsinn-network]
    ports: ["8081:8081"]
    environment:
      <<: *common-env
      MOMO_SUBSCRIPTION_KEY: ${MOMO_SUBSCRIPTION_KEY}
      MOMO_API_USER: ${MOMO_API_USER}
      MOMO_API_KEY: ${MOMO_API_KEY}
    depends_on:
      hobsinn-postgres:
        condition: service_healthy
      hobsinn-kafka:
        condition: service_healthy
    restart: unless-stopped

  provider-service:
    build:
      context: ../../
      dockerfile: services/provider-service/Dockerfile
    container_name: hobsinn-provider-service
    networks: [hobsinn-network]
    ports: ["8087:8087"]
    environment:
      <<: *common-env
    restart: unless-stopped

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile
    container_name: hobsinn-payment-service
    networks: [hobsinn-network]
    ports: ["8084:8084"]
    environment:
      <<: *common-env
      MOMO_SUBSCRIPTION_KEY: ${MOMO_SUBSCRIPTION_KEY}
      MOMO_API_USER: ${MOMO_API_USER}
      MOMO_API_KEY: ${MOMO_API_KEY}
    restart: unless-stopped

  campaign-service:
    build:
      context: ../../
      dockerfile: services/campaign-service/Dockerfile
    container_name: hobsinn-campaign-service
    networks: [hobsinn-network]
    ports: ["8082:8082"]
    environment:
      <<: *common-env
    restart: unless-stopped

  reporting-service:
    build:
      context: ../../
      dockerfile: services/reporting-service/Dockerfile
    container_name: hobsinn-reporting-service
    networks: [hobsinn-network]
    ports: ["8083:8083"]
    environment:
      <<: *common-env
    restart: unless-stopped

  notification-service:
    build:
      context: ../../
      dockerfile: services/notification-service/Dockerfile
    container_name: hobsinn-notification-service
    networks: [hobsinn-network]
    ports: ["8085:8085"]
    environment:
      <<: *common-env
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
    restart: unless-stopped

  analytics-service:
    build:
      context: ../../
      dockerfile: services/analytics-service/Dockerfile
    container_name: hobsinn-analytics-service
    networks: [hobsinn-network]
    ports: ["8088:8088"]
    environment:
      <<: *common-env
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: hobsinn-prometheus
    networks: [hobsinn-network]
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: hobsinn-grafana
    networks: [hobsinn-network]
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
