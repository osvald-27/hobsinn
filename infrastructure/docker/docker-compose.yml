version: "3.9"

# hobsinn application services
# Joins ties-network — shares TIES infrastructure (postgres, kafka, redis, mongodb)
# Run: docker-compose up -d from this directory

networks:
  ties-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: docker
  DB_HOST: ties-postgres
  DB_PORT: 5432
  DB_NAME: hobsinn_db
  DB_USERNAME: hobsinn_user
  DB_PASSWORD: ${DB_PASSWORD}
  KAFKA_BOOTSTRAP_SERVERS: ties-kafka:9092
  REDIS_HOST: ties-redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  MONGO_HOST: ties-mongodb
  MONGO_PORT: 27017
  MONGO_DB: hobsinn_analytics
  MONGO_PASSWORD: ${MONGO_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}

services:

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    container_name: hobsinn-api-gateway
    networks: [ties-network]
    ports: ["8080:8080"]
    environment:
      <<: *common-env
    restart: unless-stopped

  user-service:
    build:
      context: ../../
      dockerfile: services/user-service/Dockerfile
    container_name: hobsinn-user-service
    networks: [ties-network]
    ports: ["8086:8086"]
    environment:
      <<: *common-env
    restart: unless-stopped

  scheduling-service:
    build:
      context: ../../
      dockerfile: services/scheduling-service/Dockerfile
    container_name: hobsinn-scheduling-service
    networks: [ties-network]
    ports: ["8081:8081"]
    environment:
      <<: *common-env
      MOMO_SUBSCRIPTION_KEY: ${MOMO_SUBSCRIPTION_KEY}
      MOMO_API_USER: ${MOMO_API_USER}
      MOMO_API_KEY: ${MOMO_API_KEY}
    restart: unless-stopped

  provider-service:
    build:
      context: ../../
      dockerfile: services/provider-service/Dockerfile
    container_name: hobsinn-provider-service
    networks: [ties-network]
    ports: ["8087:8087"]
    environment:
      <<: *common-env
    restart: unless-stopped

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile
    container_name: hobsinn-payment-service
    networks: [ties-network]
    ports: ["8084:8084"]
    environment:
      <<: *common-env
      MOMO_SUBSCRIPTION_KEY: ${MOMO_SUBSCRIPTION_KEY}
      MOMO_API_USER: ${MOMO_API_USER}
      MOMO_API_KEY: ${MOMO_API_KEY}
    restart: unless-stopped

  campaign-service:
    build:
      context: ../../
      dockerfile: services/campaign-service/Dockerfile
    container_name: hobsinn-campaign-service
    networks: [ties-network]
    ports: ["8082:8082"]
    environment:
      <<: *common-env
    restart: unless-stopped

  reporting-service:
    build:
      context: ../../
      dockerfile: services/reporting-service/Dockerfile
    container_name: hobsinn-reporting-service
    networks: [ties-network]
    ports: ["8083:8083"]
    environment:
      <<: *common-env
    restart: unless-stopped

  notification-service:
    build:
      context: ../../
      dockerfile: services/notification-service/Dockerfile
    container_name: hobsinn-notification-service
    networks: [ties-network]
    ports: ["8085:8085"]
    environment:
      <<: *common-env
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
    restart: unless-stopped

  analytics-service:
    build:
      context: ../../
      dockerfile: services/analytics-service/Dockerfile
    container_name: hobsinn-analytics-service
    networks: [ties-network]
    ports: ["8088:8088"]
    environment:
      <<: *common-env
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: hobsinn-prometheus
    networks: [ties-network]
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: hobsinn-grafana
    networks: [ties-network]
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
